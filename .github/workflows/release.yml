name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Update Version in Configuration Files Dynamically
        run: |
          # Extract version from tag (e.g., refs/tags/v1.0.1 -> 1.0.1)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Triggered by tag version: $TAG_VERSION"
          
          # Dynamically patch version in Cask formula
          sed -i "s/version \".*\"/version \"$TAG_VERSION\"/g" Casks/font-yeomil-mono.rb
          
          # Dynamically patch version in pyproject.toml
          sed -i "s/version = \".*\"/version = \"$TAG_VERSION\"/g" pyproject.toml

      - name: Compile fonts
        run: make run

      - name: Create release archives
        run: |
          mkdir -p release-assets
          
          # Create TTF zip
          cd fonts/ttf
          zip -r ../../release-assets/YeomilMono-TTF.zip .
          cd -
          
          # Create OTF zip
          cd fonts/otf
          zip -r ../../release-assets/YeomilMono-OTF.zip .
          cd -
          
          # Create Web fonts zip
          cd fonts/webfont
          zip -r ../../release-assets/YeomilMono-Web.zip .
          cd -

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/YeomilMono-TTF.zip
            release-assets/YeomilMono-OTF.zip
            release-assets/YeomilMono-Web.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
